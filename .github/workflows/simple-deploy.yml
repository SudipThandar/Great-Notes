name: Simple CI/CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Status
        run: |
          echo "🚀 Deploying to production..."
          echo "📦 Backend: Render will auto-deploy"
          echo "🎨 Frontend: Vercel will auto-deploy"
          echo "✅ Push detected - deployments triggered!"
          echo ""
          echo "Monitor deployments:"
          echo "- Vercel: https://vercel.com/mikeysanhams-projects/great-notes"
          echo "- Render: https://dashboard.render.com"
